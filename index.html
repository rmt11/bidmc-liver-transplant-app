<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIDMC Liver Transplant App - Screen Generator</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; }

/* ========== DESIGN TOKENS (from Figma) ========== */
:root {
  --navy-dark: #1B3A5C;
  --navy-mid: #234B73;
  --navy-light: #2E6B9C;
  --blue-header: linear-gradient(135deg, #1B3A5C 0%, #2E6B9C 100%);
  --teal-btn: #2196A4;
  --teal-btn-hover: #1a7a86;
  --orange-accent: #E8903E;
  --orange-light: #F5A623;
  --white: #FFFFFF;
  --off-white: #F8F9FA;
  --gray-100: #F1F3F5;
  --gray-200: #E9ECEF;
  --gray-300: #DEE2E6;
  --gray-500: #868E96;
  --gray-700: #495057;
  --gray-900: #212529;
  --text-primary: #1a1a1a;
  --text-secondary: #495057;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --phone-width: 375px;
  --phone-height: 812px;
}

/* ========== LAYOUT ========== */
.app-container {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: 320px;
  min-width: 320px;
  background: var(--navy-dark);
  color: white;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar-header h1 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}
.sidebar-header p {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
}
.sidebar-section {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.4);
  padding: 8px 20px 4px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 13px;
  gap: 10px;
  position: relative;
}
.sidebar-item:hover { background: rgba(255,255,255,0.06); }
.sidebar-item.active { background: rgba(255,255,255,0.12); }
.sidebar-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--orange-accent);
  border-radius: 0 2px 2px 0;
}
.sidebar-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.done { background: #51CF66; }
.dot.existing { background: var(--orange-accent); }
.dot.pending { background: var(--gray-500); }
.sidebar-item .label { flex: 1; line-height: 1.3; }
.sidebar-item .badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 600;
}
.badge.built { background: rgba(81,207,102,0.2); color: #51CF66; }
.badge.new { background: rgba(232,144,62,0.2); color: var(--orange-accent); }

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  padding: 12px 24px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  gap: 12px;
  flex-shrink: 0;
}
.toolbar-title {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-700);
}
.toolbar-btn {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.toolbar-btn.primary {
  background: var(--navy-dark);
  color: white;
}
.toolbar-btn.primary:hover { background: var(--navy-mid); }
.toolbar-btn.secondary {
  background: var(--gray-100);
  color: var(--gray-700);
  border: 1px solid var(--gray-300);
}
.toolbar-btn.secondary:hover { background: var(--gray-200); }
.toolbar-btn.export-btn {
  background: var(--teal-btn);
  color: white;
}
.toolbar-btn.export-btn:hover { background: var(--teal-btn-hover); }

/* Preview Area */
.preview-area {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 30px;
  overflow-y: auto;
  background: var(--gray-100);
}

/* ========== PHONE FRAME ========== */
.phone-frame {
  width: var(--phone-width);
  min-height: var(--phone-height);
  background: white;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 8px #1a1a1a;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.phone-notch {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 30px;
  background: #1a1a1a;
  border-radius: 0 0 18px 18px;
  z-index: 10;
}
.phone-status-bar {
  height: 50px;
  background: var(--navy-dark);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 24px 6px;
  font-size: 12px;
  font-weight: 600;
  color: white;
}
.phone-status-bar .time { font-size: 14px; font-weight: 700; }
.phone-status-bar .icons { display: flex; gap: 4px; font-size: 11px; }

/* ========== SCREEN STYLES (matching Figma) ========== */
.screen-content {
  min-height: calc(var(--phone-height) - 50px);
  overflow-y: auto;
  max-height: calc(var(--phone-height) - 50px);
}

/* Nav bar */
.screen-nav {
  background: linear-gradient(135deg, var(--navy-dark), var(--navy-mid));
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 5;
}
.screen-nav .back-arrow {
  color: white;
  font-size: 20px;
  cursor: pointer;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.screen-nav .nav-title {
  color: white;
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  text-align: center;
  padding-right: 28px;
}

/* Breadcrumb */
.screen-breadcrumb {
  padding: 12px 20px 0;
  font-size: 12px;
  color: var(--gray-500);
}

/* Page Title */
.screen-title {
  padding: 8px 20px 16px;
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.25;
}

/* Image Placeholder */
.screen-image {
  margin: 0 20px 16px;
  background: linear-gradient(135deg, #2c3e50, #34495e);
  border-radius: var(--radius-md);
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.screen-image .expand-icon {
  position: absolute;
  top: 10px;
  right: 10px;
  color: white;
  font-size: 16px;
  opacity: 0.7;
}
.screen-image .placeholder-text {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  text-align: center;
  padding: 20px;
}
.screen-image-caption {
  padding: 0 20px 16px;
  font-size: 12px;
  color: var(--gray-500);
}

/* Body text */
.screen-body {
  padding: 0 20px 16px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-primary);
}
.screen-body p { margin-bottom: 12px; }
.screen-body strong { font-weight: 600; }
.screen-body em { font-style: italic; color: var(--text-secondary); }

/* Bullet list */
.screen-bullets {
  padding: 0 20px 16px;
  list-style: none;
}
.screen-bullets li {
  position: relative;
  padding-left: 20px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
}
.screen-bullets li::before {
  content: '\2022';
  position: absolute;
  left: 4px;
  top: 0;
  color: var(--navy-mid);
  font-size: 18px;
  font-weight: 700;
}

/* Tab Pills */
.screen-tabs {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.screen-tab {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  transition: background 0.15s;
}
.screen-tab:hover { background: var(--gray-200); }
.screen-tab.active {
  background: var(--navy-dark);
  color: white;
}
.screen-tab .chevron { font-size: 16px; opacity: 0.5; }

/* Info Card (dark navy) */
.screen-info-card {
  margin: 0 16px 16px;
  background: linear-gradient(135deg, var(--navy-dark), #1e3a5f);
  border-radius: var(--radius-md);
  padding: 20px;
  color: white;
}
.screen-info-card h4 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  color: white;
}
.screen-info-card h5 {
  font-size: 13px;
  font-weight: 700;
  margin-top: 12px;
  margin-bottom: 6px;
  color: var(--orange-accent);
}
.screen-info-card p {
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.85);
  margin-bottom: 8px;
}
.screen-info-card ul {
  margin: 8px 0;
  padding-left: 18px;
}
.screen-info-card li {
  font-size: 13px;
  line-height: 1.5;
  color: rgba(255,255,255,0.85);
  margin-bottom: 4px;
}

/* Accordion */
.screen-accordion {
  margin: 0 16px 16px;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.accordion-item {
  border-bottom: 1px solid var(--gray-200);
}
.accordion-item:last-child { border-bottom: none; }
.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}
.accordion-chevron {
  width: 28px;
  height: 28px;
  background: var(--orange-accent);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.accordion-chevron.open { transform: rotate(180deg); }
.accordion-body {
  padding: 0 16px 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
  display: none;
}
.accordion-body.open { display: block; }

/* Next/CTA Section */
.screen-next {
  margin: 16px;
  background: linear-gradient(135deg, #1B4B6C, #2196A4);
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  text-align: center;
}
.screen-next .next-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
}
.screen-next .next-btn {
  display: inline-block;
  padding: 12px 32px;
  background: var(--teal-btn);
  color: white;
  border-radius: 25px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
}
.screen-next .mark-complete {
  display: block;
  margin-top: 12px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  text-decoration: underline;
  cursor: pointer;
}

/* Sub-index links */
.screen-subindex {
  padding: 0 20px 16px;
}
.screen-subindex h4 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
}
.screen-subindex a {
  display: block;
  padding: 10px 0;
  font-size: 14px;
  color: var(--navy-mid);
  text-decoration: underline;
  border-bottom: 1px solid var(--gray-200);
  cursor: pointer;
}
.screen-subindex a:last-child { border-bottom: none; }

/* Section heading */
.screen-section-heading {
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

/* Video placeholder */
.screen-video {
  margin: 0 20px 16px;
  background: linear-gradient(135deg, #1a2a3a, #2c4050);
  border-radius: var(--radius-md);
  height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.screen-video .play-btn {
  width: 50px;
  height: 50px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
}
.screen-video .video-label {
  color: rgba(255,255,255,0.6);
  font-size: 12px;
}

/* Contact card */
.screen-contact {
  margin: 0 16px 16px;
  background: var(--gray-100);
  border-radius: var(--radius-md);
  padding: 16px;
}
.screen-contact h4 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}
.screen-contact p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.screen-contact a {
  color: var(--navy-mid);
  text-decoration: underline;
}

/* Table */
.screen-table {
  margin: 0 16px 16px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--gray-300);
  font-size: 12px;
}
.screen-table table {
  width: 100%;
  border-collapse: collapse;
}
.screen-table th {
  background: var(--navy-dark);
  color: white;
  padding: 10px 8px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
}
.screen-table td {
  padding: 8px;
  border-bottom: 1px solid var(--gray-200);
  font-size: 11px;
  line-height: 1.4;
  vertical-align: top;
}
.screen-table tr:last-child td { border-bottom: none; }
.screen-table tr:nth-child(even) td { background: var(--gray-100); }

/* Language selector */
.lang-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  margin: 0 16px 8px;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  font-size: 15px;
  cursor: pointer;
  transition: background 0.15s;
}
.lang-option:hover { background: var(--gray-200); }
.lang-option .radio {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--gray-300);
  display: flex;
  align-items: center;
  justify-content: center;
}
.lang-option.selected .radio {
  border-color: var(--navy-dark);
}
.lang-option.selected .radio::after {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--navy-dark);
}

/* Stage cards (home screen) */
.stage-card {
  margin: 0 16px 10px;
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--navy-dark), var(--navy-mid));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.15s;
}
.stage-card:hover { transform: scale(1.01); }
.stage-card .stage-num {
  width: 32px;
  height: 32px;
  background: var(--orange-accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.stage-card .stage-label {
  color: white;
  font-size: 14px;
  font-weight: 500;
  flex: 1;
}
.stage-card .stage-arrow {
  color: rgba(255,255,255,0.5);
  font-size: 16px;
}

/* Info row with icon */
.info-row {
  display: flex;
  gap: 12px;
  padding: 12px 20px;
  align-items: flex-start;
}
.info-row .info-icon {
  width: 36px;
  height: 36px;
  background: var(--gray-100);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.info-row .info-text {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
}

/* Bottom safe area */
.screen-bottom-pad {
  height: 34px;
  flex-shrink: 0;
}

/* ========== RIGHT PANEL (Code Export) ========== */
.code-panel {
  width: 420px;
  min-width: 420px;
  background: #1e1e1e;
  color: #d4d4d4;
  display: none;
  flex-direction: column;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
}
.code-panel.visible { display: flex; }
.code-panel-header {
  padding: 12px 16px;
  background: #2d2d2d;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #404040;
}
.code-panel-header span { font-size: 12px; font-weight: 600; color: #ccc; }
.code-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  white-space: pre-wrap;
  line-height: 1.6;
}
.copy-btn {
  padding: 4px 10px;
  font-size: 11px;
  background: #404040;
  color: #ccc;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.copy-btn:hover { background: #505050; }

/* ========== RESPONSIVE ========== */
@media (max-width: 1100px) {
  .sidebar { width: 260px; min-width: 260px; }
  .code-panel { width: 320px; min-width: 320px; }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
.code-panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="app-container">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- MAIN -->
  <div class="main-content">
    <div class="toolbar">
      <div class="toolbar-title" id="toolbarTitle">Welcome Screen</div>
      <button class="toolbar-btn secondary" onclick="toggleCodePanel()">{ } Code</button>
      <button class="toolbar-btn secondary" onclick="prevScreen()">&#9664; Prev</button>
      <button class="toolbar-btn secondary" onclick="nextScreen()">Next &#9654;</button>
      <button class="toolbar-btn export-btn" onclick="exportCurrentScreen()">Export HTML</button>
      <button class="toolbar-btn primary" onclick="exportAllScreens()">Export All</button>
    </div>
    <div class="preview-area">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-status-bar">
          <span class="time">12:15</span>
          <span class="icons">&#9679;&#9679;&#9679; &#9632;</span>
        </div>
        <div class="screen-content" id="screenContent"></div>
      </div>
    </div>
  </div>

  <!-- CODE PANEL -->
  <div class="code-panel" id="codePanel">
    <div class="code-panel-header">
      <span>Screen Code</span>
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
    <div class="code-panel-body" id="codeBody"></div>
  </div>
</div>

<script>
// ========== SCREEN DATA ==========
const screens = [
  // === WELCOME / HOME ===
  {
    id: 'welcome',
    title: 'Welcome',
    section: 'Home',
    status: 'new',
    render: () => `
      <div class="screen-nav">
        <div class="nav-title">BIDMC Transplant Institute</div>
      </div>
      <div class="screen-breadcrumb">Liver Education Program</div>
      <div class="screen-title">Welcome to the Transplant Department at Beth Israel Deaconess Medical Center</div>
      <div class="screen-image">
        <div class="placeholder-text">BIDMC Transplant Institute<br>Hero Image</div>
      </div>
      <div class="screen-section-heading">Select your Language</div>
      <div class="lang-option selected"><div class="radio"></div> English (Validated)</div>
      <div class="lang-option"><div class="radio"></div> Espa\u00f1ol ~ Spanish (Validated)</div>
      <div class="lang-option"><div class="radio"></div> \u6F22\u5B57 ~ Mandarin (Validated)</div>
      <div class="lang-option"><div class="radio"></div> Others (AI Generated)</div>
      <div class="screen-section-heading" style="margin-top:8px">Select your Current Stage</div>
      <div class="stage-card" onclick="goTo('s1-overview')"><div class="stage-num">1</div><div class="stage-label">Pre-Liver Transplant Evaluation</div><div class="stage-arrow">\u203A</div></div>

        <p>A liver transplant may be considered as a treatment option for people with advanced or end-stage liver disease, who have deteriorating liver function and quality of life, and who are unable to benefit from other medical and surgical treatments.</p>
        <p>Many different diseases can harm the liver. Some are "acute," occurring quickly in just days or weeks, while others are "chronic" and take years to do damage. The liver has an amazing ability to regenerate, or make new liver tissue. However, extensive damage to liver cells can lead to scarring, which can prevent this recovery. Cirrhosis occurs because of chronic liver damage.</p>

        <li>It increases pressure in veins which flow into the liver ("portal" veins), leading to high blood pressure within the liver ("portal hypertension").</li>
      </ul>
      <div class="screen-body">
        <p>Any patient with liver disease that severely impairs quality of life or threatens to shorten one's life may be a candidate for liver transplantation.</p>
      </div>

        <div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)">UNOS<div class="accordion-chevron">\u25BC</div></div><div class="accordion-body">United Network for Organ Sharing. A private, nonprofit organization that coordinates the nation's organ transplant system.</div></div>
        <div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)">Immunosuppression<div class="accordion-chevron">\u25BC</div></div><div class="accordion-body">Medications that reduce the body's immune response to prevent rejection of the transplanted organ.</div></div>
        <div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)">Portal Hypertension<div class="accordion-chevron">\u25BC</div></div><div class="accordion-body">High blood pressure within the liver's portal venous system, often caused by cirrhosis.</div></div>
        <div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)">Hepatocellular Carcinoma (HCC)<div class="accordion-chevron">\u25BC</div></div><div class="accordion-body">The most common primary liver tumor in adults and one of the most common reasons for liver transplantation.</div></div>
        <div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)">OPO<div class="accordion-chevron">\u25BC</div></div><div class="accordion-body">Organ Procurement Organization. The local organization that coordinates the recovery of organs from deceased donors.</div></div>
        <div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)">Donor Net<div class="accordion-chevron">\u25BC</div></div><div class="accordion-body">An internet-based system used by transplant surgeons to receive organ offers and respond to them.</div></div>
      </div>
      <div class="screen-next">
        <div class="next-label">COMPLETE</div>
        <div class="next-btn" onclick="goTo('welcome')">Back to Home</div>
        <div class="mark-complete">Mark this as completed</div>
      </div>
      <div class="screen-bottom-pad"></div>
    `
  },
];

// ========== STATE ==========
let currentScreenIndex = 0;
let codePanelVisible = false;

// ========== SIDEBAR RENDER ==========
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = `
    <div class="sidebar-header">
      <h1>BIDMC Liver Transplant App</h1>
      <p>Screen Generator \u2022 ${screens.length} screens</p>
    </div>
  `;
  let currentSection = '';
  screens.forEach((s, i) => {
    if (s.section !== currentSection) {
      currentSection = s.section;
      html += `<div class="sidebar-section"><div class="sidebar-section-title">${currentSection}</div>`;
    }
    const dotClass = s.status === 'existing' ? 'existing' : s.status === 'done' ? 'done' : 'pending';
    const badgeClass = s.status === 'existing' ? 'built' : 'new';
    const badgeText = s.status === 'existing' ? 'BUILT' : 'NEW';
    html += `
      <div class="sidebar-item ${i === currentScreenIndex ? 'active' : ''}" onclick="goToIndex(${i})">
        <div class="dot ${dotClass}"></div>
        <div class="label">${s.title}</div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
    `;
  });
  html += '</div>';
  sidebar.innerHTML = html;
}

// ========== SCREEN RENDER ==========
function renderScreen() {
  const screen = screens[currentScreenIndex];
  document.getElementById('screenContent').innerHTML = screen.render();
  document.getElementById('toolbarTitle').textContent = `${screen.title} (${currentScreenIndex + 1}/${screens.length})`;
  renderSidebar();
  if (codePanelVisible) updateCodePanel();
  document.getElementById('screenContent').scrollTop = 0;
}

// ========== NAVIGATION ==========
function goTo(id) {
  const idx = screens.findIndex(s => s.id === id);
  if (idx !== -1) { currentScreenIndex = idx; renderScreen(); }
}
function goToIndex(i) { currentScreenIndex = i; renderScreen(); }
function nextScreen() { if (currentScreenIndex < screens.length - 1) { currentScreenIndex++; renderScreen(); } }
function prevScreen() { if (currentScreenIndex > 0) { currentScreenIndex--; renderScreen(); } }

// ========== ACCORDION ==========
function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.accordion-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

// ========== CONDITION INFO (indications screen) ==========
function showCondition(el, name, desc) {
  document.querySelectorAll('.screen-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const info = document.getElementById('conditionInfo');
  if (info) {
    info.style.display = 'block';
    info.innerHTML = `<h4>${name}</h4><p>${desc}</p>`;
  }
}

// ========== CODE PANEL ==========
function toggleCodePanel() {
  codePanelVisible = !codePanelVisible;
  document.getElementById('codePanel').classList.toggle('visible', codePanelVisible);
  if (codePanelVisible) updateCodePanel();
}

function updateCodePanel() {
  const screen = screens[currentScreenIndex];
  const html = screen.render();
  const escaped = html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  document.getElementById('codeBody').innerHTML = escaped;
}

function copyCode() {
  const screen = screens[currentScreenIndex];
  const code = screen.render();
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ========== EXPORT ==========
function exportCurrentScreen() {
  const screen = screens[currentScreenIndex];
  const fullHtml = generateExportHtml(screen.title, screen.render());
  downloadFile(`${screen.id}.html`, fullHtml);
}

function exportAllScreens() {
  screens.forEach(screen => {
    const fullHtml = generateExportHtml(screen.title, screen.render());
    downloadFile(`${screen.id}.html`, fullHtml);
  });
}

function generateExportHtml(title, content) {
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; background: #fff; color: #1a1a1a; max-width: 430px; margin: 0 auto; }
:root { --navy-dark: #1B3A5C; --navy-mid: #234B73; --navy-light: #2E6B9C; --teal-btn: #2196A4; --orange-accent: #E8903E; --gray-100: #F1F3F5; --gray-200: #E9ECEF; --gray-300: #DEE2E6; --gray-500: #868E96; --gray-700: #495057; }
.screen-nav { background: linear-gradient(135deg, var(--navy-dark), var(--navy-mid)); padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 5; }
.screen-nav .back-arrow { color: white; font-size: 20px; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.screen-nav .nav-title { color: white; font-size: 15px; font-weight: 600; flex: 1; text-align: center; padding-right: 28px; }
.screen-breadcrumb { padding: 12px 20px 0; font-size: 12px; color: var(--gray-500); }
.screen-title { padding: 8px 20px 16px; font-size: 24px; font-weight: 700; color: #1a1a1a; line-height: 1.25; }
.screen-image { margin: 0 20px 16px; background: linear-gradient(135deg, #2c3e50, #34495e); border-radius: 12px; height: 180px; display: flex; align-items: center; justify-content: center; }
.screen-image .placeholder-text { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; padding: 20px; }
.screen-body { padding: 0 20px 16px; font-size: 15px; line-height: 1.6; }
.screen-body p { margin-bottom: 12px; }
.screen-bullets { padding: 0 20px 16px; list-style: none; }
.screen-bullets li { position: relative; padding-left: 20px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; }
.screen-bullets li::before { content: '\\2022'; position: absolute; left: 4px; top: 0; color: var(--navy-mid); font-size: 18px; font-weight: 700; }
.screen-tabs { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 6px; }
.screen-tab { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--gray-100); border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.screen-tab.active { background: var(--navy-dark); color: white; }
.screen-info-card { margin: 0 16px 16px; background: linear-gradient(135deg, var(--navy-dark), #1e3a5f); border-radius: 12px; padding: 20px; color: white; }
.screen-info-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.screen-info-card h5 { font-size: 13px; font-weight: 700; margin-top: 12px; margin-bottom: 6px; color: var(--orange-accent); }
.screen-info-card p { font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.85); margin-bottom: 8px; }
.screen-accordion { margin: 0 16px 16px; background: var(--gray-100); border-radius: 12px; overflow: hidden; }
.accordion-item { border-bottom: 1px solid var(--gray-200); }
.accordion-item:last-child { border-bottom: none; }
.accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; font-size: 14px; font-weight: 600; }
.accordion-chevron { width: 28px; height: 28px; background: var(--orange-accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.accordion-body { padding: 0 16px 14px; font-size: 13px; line-height: 1.6; color: var(--gray-700); display: none; }
.accordion-body.open { display: block; }
.screen-next { margin: 16px; background: linear-gradient(135deg, #1B4B6C, #2196A4); border-radius: 16px; padding: 24px 20px; text-align: center; }
.screen-next .next-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 12px; }
.screen-next .next-btn { display: inline-block; padding: 12px 32px; background: var(--teal-btn); color: white; border-radius: 25px; font-size: 14px; font-weight: 600; cursor: pointer; }
.screen-next .mark-complete { display: block; margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: underline; cursor: pointer; }
.screen-subindex { padding: 0 20px 16px; }
.screen-subindex h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.screen-subindex a { display: block; padding: 10px 0; font-size: 14px; color: var(--navy-mid); text-decoration: underline; border-bottom: 1px solid var(--gray-200); cursor: pointer; }
.screen-video { margin: 0 20px 16px; background: linear-gradient(135deg, #1a2a3a, #2c4050); border-radius: 12px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.screen-video .play-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
.screen-video .video-label { color: rgba(255,255,255,0.6); font-size: 12px; }
.screen-contact { margin: 0 16px 16px; background: var(--gray-100); border-radius: 12px; padding: 16px; }
.screen-contact h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.screen-contact p { font-size: 13px; line-height: 1.6; color: var(--gray-700); }
.screen-section-heading { padding: 12px 20px; font-size: 16px; font-weight: 700; }
.screen-table { margin: 0 16px 16px; border-radius: 8px; overflow: hidden; border: 1px solid var(--gray-300); }
.screen-table table { width: 100%; border-collapse: collapse; }
.screen-table th { background: var(--navy-dark); color: white; padding: 10px 8px; text-align: left; font-size: 11px; font-weight: 600; }
.screen-table td { padding: 8px; border-bottom: 1px solid var(--gray-200); font-size: 11px; line-height: 1.4; vertical-align: top; }
.screen-table tr:nth-child(even) td { background: var(--gray-100); }
.lang-option { display: flex; align-items: center; gap: 12px; padding: 14px 20px; margin: 0 16px 8px; background: var(--gray-100); border-radius: 8px; font-size: 15px; cursor: pointer; }
.lang-option .radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--gray-300); display: flex; align-items: center; justify-content: center; }
.lang-option.selected .radio { border-color: var(--navy-dark); }
.lang-option.selected .radio::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--navy-dark); }
.stage-card { margin: 0 16px 10px; padding: 16px 20px; background: linear-gradient(135deg, var(--navy-dark), var(--navy-mid)); border-radius: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
.stage-card .stage-num { width: 32px; height: 32px; background: var(--orange-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; }
.stage-card .stage-label { color: white; font-size: 14px; font-weight: 500; flex: 1; }
</style>
</head>
<body>
${content}
<script>
function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.accordion-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}
<\/script>
</body>
</html>`;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ========== KEYBOARD NAV ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextScreen();
  if (e.key === 'ArrowLeft') prevScreen();
});

// ========== INIT ==========
renderScreen();
</script>
</body>
</html>
